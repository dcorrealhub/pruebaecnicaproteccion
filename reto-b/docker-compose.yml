services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-proteccion_reto}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-proteccion_reto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL:      jdbc:postgresql://db:5432/${POSTGRES_DB:-proteccion_reto}
      DB_USER:     ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SERVER_PORT: 8082
      APORTE_TOPE_MENSUAL:    ${APORTE_TOPE_MENSUAL:-10000000}
      APORTE_UMBRAL_REVISION: ${APORTE_UMBRAL_REVISION:-5000000}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8082"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
