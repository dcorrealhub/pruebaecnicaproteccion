spring.application.name=reto-b

# PostgreSQL — levanta con: docker compose up -d (desde la raíz del proyecto)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/proteccion_reto}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway gestiona el esquema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8082}

# Parámetros del fondo — defaults; el valor activo se lee de historico_parametros al arrancar
aporte.tope-mensual=${APORTE_TOPE_MENSUAL:10000000}
aporte.umbral-revision=${APORTE_UMBRAL_REVISION:5000000}
