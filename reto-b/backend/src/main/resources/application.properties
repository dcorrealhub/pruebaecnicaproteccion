spring.application.name=reto-b

# PostgreSQL — levanta con: docker compose up -d (desde la raiz del proyecto)
spring.datasource.url=jdbc:postgresql://localhost:5432/proteccion_reto
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway gestiona el esquema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8082

# Tope mensual y umbral de revision son configurables
aporte.tope-mensual=10000000
aporte.umbral-revision=5000000

#Documentación
springdoc.swagger-ui.path=/swagger-ui.html