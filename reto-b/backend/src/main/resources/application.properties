spring.application.name=reto-b

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway gestiona el esquema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8082

# Auth — credenciales via variables de entorno obligatorias
api.auth.username=${API_USERNAME}
api.auth.password=${API_PASSWORD}
api.jwt.secret=${JWT_SECRET}
api.jwt.expiration-hours=9

# Tope mensual y umbral de revision son configurables
aporte.tope-mensual=10000000
aporte.umbral-revision=5000000
