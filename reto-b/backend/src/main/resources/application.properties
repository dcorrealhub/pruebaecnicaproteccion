spring.application.name=reto-b

# PostgreSQL — levanta con: docker compose up -d (desde la raiz del proyecto)
spring.datasource.url=jdbc:postgresql://localhost:5432/proteccion_reto
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway gestiona el esquema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8082

# Fechas en formato ISO-8601 (ej: "2025-06-26") en vez de arreglos numericos
spring.jackson.serialization.write-dates-as-timestamps=false

# El tope mensual y el umbral de revision son configurables en runtime desde la
# tabla parametro_aporte (ver V2__parametros_y_estado.sql), no desde este archivo.
